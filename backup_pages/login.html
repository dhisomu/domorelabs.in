<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DoMoreLabs</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6",
                        "primary-dark": "#2563eb",
                        accent: "#8b5cf6",
                        "accent-dark": "#7c3aed",
                        "bg-dark": "#0f172a",
                        "bg-card": "#1e293b",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                    }
                }
            }
        }
    </script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-bg-dark text-white font-sans antialiased selection:bg-blue-600 selection:text-white">
    <!-- Navbar (Simplified for Login) -->
    <nav class="fixed top-0 left-0 w-full z-50 py-4 bg-transparent">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                    <img src="assets/logo.png" alt="DoMoreLabs Logo" class="h-32 w-auto object-contain drop-shadow-lg scale-110 origin-left" />
            </a>
        </div>
    </nav>

    <div class="min-h-screen pt-24 bg-bg-dark flex items-center justify-center p-4">
        <div
            class="bg-bg-card border border-slate-700 p-8 rounded-xl shadow-2xl max-w-md w-full relative overflow-hidden">
            <!-- Background Glow -->
            <div class="absolute top-0 right-0 -mt-10 -mr-10 w-32 h-32 bg-purple-500/20 rounded-full blur-3xl"></div>
            <div class="absolute bottom-0 left-0 -mb-10 -ml-10 w-32 h-32 bg-blue-500/20 rounded-full blur-3xl"></div>

            <h2
                class="text-3xl font-bold text-center mb-8 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent relative z-10">
                Welcome Back
            </h2>

            <div id="error-message"
                class="hidden bg-red-500/10 border border-red-500/50 text-red-500 p-3 rounded-lg mb-6 text-sm">
            </div>

            <div class="space-y-4 relative z-10">
                <form id="login-form" class="space-y-4">
                    <div>
                        <input name="email" type="email" placeholder="Email Address"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 bg-opacity-50"
                            required value="admin@domore.co.in">
                    </div>
                    <div>
                        <input name="password" type="password" placeholder="Password"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 bg-opacity-50"
                            required value="password">
                    </div>
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-lg font-bold hover:shadow-lg hover:shadow-blue-500/25 transition-all text-sm uppercase tracking-wide">
                        Sign In
                    </button>
                </form>

                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-slate-700"></div>
                    <span class="flex-shrink-0 mx-4 text-slate-500 text-xs">OR CONTINUE WITH</span>
                    <div class="flex-grow border-t border-slate-700"></div>
                </div>

                <button onclick="mockLogin('Google')"
                    class="w-full flex items-center justify-center gap-3 bg-white text-slate-900 py-3 rounded-lg font-medium hover:bg-slate-100 transition-colors">
                    <img src="https://www.google.com/favicon.ico" alt="Google" class="w-5 h-5">
                    Sign in with Google
                </button>
            </div>

            <div class="mt-8 border-t border-slate-700 pt-6 relative z-10">
                <h3 class="text-sm text-slate-400 font-semibold mb-4 text-center">Developer / Test Login</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="loginAs('SUPER_ADMIN')"
                        class="px-3 py-2 bg-purple-500/10 text-purple-400 border border-purple-500/20 rounded hover:bg-purple-500/20 text-xs cursor-pointer">Super
                        Admin</button>
                    <button onclick="loginAs('ADMIN')"
                        class="px-3 py-2 bg-purple-500/10 text-purple-400 border border-purple-500/20 rounded hover:bg-purple-500/20 text-xs cursor-pointer">Admin</button>
                    <button onclick="loginAs('FACULTY')"
                        class="px-3 py-2 bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded hover:bg-blue-500/20 text-xs cursor-pointer">Faculty</button>
                    <button onclick="loginAs('INSTITUTION')"
                        class="px-3 py-2 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded hover:bg-emerald-500/20 text-xs cursor-pointer">Institution</button>
                    <button onclick="loginAs('INDUSTRY_PARTNER')"
                        class="px-3 py-2 bg-orange-500/10 text-orange-400 border border-orange-500/20 rounded hover:bg-orange-500/20 text-xs cursor-pointer">Industry</button>
                    <button onclick="loginAs('STUDENT')"
                        class="col-span-2 px-3 py-2 bg-slate-500/10 text-slate-400 border border-slate-500/20 rounded hover:bg-slate-500/20 text-xs cursor-pointer">Student</button>
                </div>
            </div>

            <p class="text-center text-slate-400 mt-8 text-xs relative z-10">
                By signing in, you agree to our Terms of Service and Privacy Policy.
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function loginAs(role) {
            const user = {
                uid: 'mock-user-' + role,
                email: 'user@domore.co.in',
                displayName: 'Mock User',
                role: role,
                photoURL: null
            };
            localStorage.setItem('currentUser', JSON.stringify(user));
            redirectToDashboard(role);
        }

        function mockLogin(provider) {
            const user = {
                uid: 'mock-user-' + provider,
                email: 'user@' + provider.toLowerCase() + '.com',
                displayName: 'Mock ' + provider + ' User',
                role: 'STUDENT', // Default role for social login
                photoURL: null
            };
            localStorage.setItem('currentUser', JSON.stringify(user));
            redirectToDashboard(user.role);
        }

        function redirectToDashboard(role) {
            if (role === 'ADMIN' || role === 'SUPER_ADMIN') {
                window.location.href = 'admin_dashboard.html';
            } else if (role === 'STUDENT') {
                window.location.href = 'student_dashboard.html';
            } else if (role === 'FACULTY') {
                window.location.href = 'faculty_dashboard.html';
            } else if (role === 'INSTITUTION') {
                window.location.href = 'institution_dashboard.html';
            } else if (role === 'INDUSTRY_PARTNER') {
                window.location.href = 'industry_dashboard.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Mock regular login
            loginAs('STUDENT');
        });
    </script>
</body>

</html>
