name: dml-dev

services:
  dml-dev-db:
    image: mariadb:latest
    container_name: dml-dev-db
    restart: always
    volumes:
      - ./mariadb_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass_123
      - MYSQL_DATABASE=moodle
      - MYSQL_USER=moodle_user
      - MYSQL_PASSWORD=moodle_pass_123
    networks:
      dml-net:
        ipv4_address: 172.40.2.20

  dml-dev-app:
    build:
      context: .
      dockerfile: Dockerfile.moodle
    container_name: dml-dev-app
    restart: always
    volumes:
      - moodle_data:/var/www/html
      - moodledata_data:/var/www/moodledata
    depends_on:
      - dml-dev-db
    networks:
      dml-net:
        ipv4_address: 172.40.2.10

  dml-dev-nginx:
    image: nginx:stable-alpine
    container_name: dev.domorelabs.in
    restart: always
    volumes:
      - moodle_data:/var/www/html:ro
      - ./conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dml-dev.rule=Host(`dev.domorelabs.in`)"
      - "traefik.http.routers.dml-dev.tls=true"
      - "traefik.http.routers.dml-dev.tls.certresolver=lets-encrypt"
    depends_on:
      - dml-dev-app
    networks:
      dml-net:
        ipv4_address: 172.40.2.30

volumes:
  moodle_data:
  moodledata_data:

networks:
  dml-net:
    driver: bridge
    name: dml-dev-net
    ipam:
      config:
        - subnet: 172.40.2.0/24
